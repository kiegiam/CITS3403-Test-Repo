<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}"
    >
</head>
<body class="bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">FitTrack</a>
                <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">Logout</a>
            </div>
        </nav>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3">Welcome to your dashboard</h1>
                    <p class="mb-0">You are logged in as <strong>{{ email }}</strong>.</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
