<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Edit Profile</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}"
    >
</head>
<body class="bg-light">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">FitTrack</a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNav"
                    aria-controls="mainNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center">
                        <li class="nav-item">
                            <a class="nav-link " href="{{ url_for('dashboard') }}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="{{ url_for('profile') }}">Profile</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="{{ url_for('workouts') }}">My Workouts</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="{{ url_for('plans') }}">Plans</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="{{ url_for('progress') }}">Progress</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="{{ url_for('ranking') }}">Ranking</a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-4">Edit Profile</h1>

                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                <div class="alert alert-danger" role="alert">
                                    {{ messages[0] }}
                                </div>
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                    name="name"
                                    value="{{ profile.name }}"
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label for="goal" class="form-label">Fitness Goal</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="goal"
                                    name="goal"
                                    value="{{ profile.goal }}"
                                >
                            </div>

                            <div class="mb-3">
                                <label for="location" class="form-label">Location</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="location"
                                    name="location"
                                    value="{{ profile.location }}"
                                >
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">Save Changes</button>
                                <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
